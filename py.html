<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecretPool</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">

<style>
body{margin:0;font-family:system-ui;height:100vh;display:flex;flex-direction:column;background:#1e1e1e;color:white;}
header{background:#111;padding:10px;display:flex;justify-content:space-between;align-items:center;}
button{background:#4CAF50;border:none;padding:6px 12px;color:white;border-radius:6px;cursor:pointer;margin-left:4px;}
button:hover{background:#45a049;}
#tab-bar{display:flex;align-items:center;background:#222;padding:4px;overflow-x:auto;}
.tab{padding:6px 12px;background:#333;margin-right:2px;border-radius:4px;cursor:pointer;white-space:nowrap;}
.tab.active{background:#4CAF50;}
.tab .close{margin-left:6px;color:red;font-weight:bold;cursor:pointer;}
.tab .rename{margin-left:4px;color:yellow;font-weight:bold;cursor:pointer;}
.container{flex:1;display:grid;grid-template-columns:1fr 1fr;}
.CodeMirror{height:100%;font-size:14px;}
.output{background:black;color:#00ff90;font-family:monospace;padding:10px;overflow:auto;}
#pip-section{background:#222;padding:4px;display:flex;align-items:center;}
#pip-section input{flex:1;padding:4px;margin-right:4px;border-radius:4px;border:none;}
#findreplace{background:#222;padding:4px;display:flex;align-items:center;margin-top:2px;}
#findreplace input{padding:4px;margin-right:4px;border-radius:4px;border:none;}
</style>
</head>
<body>

<header>
  <strong>🐍 Python IDE — Multi-Tab + Pip + Find/Replace</strong>
  <div>
    <button onclick="runPython()">▶ Run</button>
    <button onclick="addTab()">+ Tab</button>
  </div>
</header>

<div id="tab-bar"></div>

<div id="pip-section">
  <input id="pip-input" placeholder="Package name (e.g., numpy)" />
  <button onclick="installPackage()">Install Package</button>
</div>

<div id="findreplace">
  <input id="find-input" placeholder="Find" />
  <input id="replace-input" placeholder="Replace" />
  <button onclick="findReplace()">Replace</button>
</div>

<div class="container">
  <textarea id="editor"></textarea>
  <div id="output" class="output">Loading Python runtime...</div>
</div>

<!-- CodeMirror -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<script>
let pyodide;
const outputDiv = document.getElementById("output");
const pipInput = document.getElementById("pip-input");
const findInput = document.getElementById("find-input");
const replaceInput = document.getElementById("replace-input");

/* ---------- Autocomplete ---------- */
const pythonKeywords = [
"print","input","len","range","int","float","str","list","dict","set","tuple",
"for","while","if","elif","else","try","except","finally","def","return",
"class","import","from","as","pass","break","continue","True","False","None",
"and","or","not","in","is","with","lambda","yield","global","nonlocal"
];

/* ---------- Editor ---------- */
let editor = CodeMirror.fromTextArea(document.getElementById("editor"),{
  mode:"python",
  lineNumbers:true,
  extraKeys:{"Ctrl-Space":"autocomplete"}
});

CodeMirror.registerHelper("hint","python",function(cm){
  const cursor = cm.getCursor();
  const token = cm.getTokenAt(cursor);
  const start = token.start, end = cursor.ch, word = token.string;
  const list = pythonKeywords.filter(k=>k.startsWith(word));
  return {list:list, from:CodeMirror.Pos(cursor.line,start), to:CodeMirror.Pos(cursor.line,end)};
});

editor.on("inputRead", function(cm,change){
  if(change.text[0].match(/[a-zA-Z_]/)){cm.showHint({completeSingle:false});}
});

/* ---------- Multi-tab system ---------- */
let tabs = []; 
let activeTab = null;
const tabBar = document.getElementById("tab-bar");

function addTab(name="main", code="print('Hello Python!')"){
  const tab = {name, code};
  tabs.push(tab);
  activeTab = tab;
  renderTabs();
  loadTab(tab);
}

function renderTabs(){
  tabBar.innerHTML="";
  tabs.forEach((t,i)=>{
    const el=document.createElement("div");
    el.className="tab"+(t===activeTab?" active":"");
    el.textContent=t.name;
    el.onclick=()=>{saveTab(); activeTab=t; loadTab(t); renderTabs();};
    const closeBtn=document.createElement("span");
    closeBtn.textContent="✕";
    closeBtn.className="close";
    closeBtn.onclick=e=>{e.stopPropagation(); deleteTab(i);}
    const renameBtn=document.createElement("span");
    renameBtn.textContent="✎";
    renameBtn.className="rename";
    renameBtn.onclick=e=>{e.stopPropagation(); renameTab(i);}
    el.appendChild(renameBtn);
    el.appendChild(closeBtn);
    tabBar.appendChild(el);
  });
}

function loadTab(tab){editor.setValue(tab.code);}
function saveTab(){if(activeTab) activeTab.code=editor.getValue();}
function deleteTab(index){if(tabs[index]===activeTab){activeTab=tabs[0]||null;} tabs.splice(index,1); renderTabs(); if(activeTab) loadTab(activeTab);}
function renameTab(index){const newName=prompt("Enter new tab name:",tabs[index].name);if(newName) tabs[index].name=newName; renderTabs();}

/* ---------- Load Python ---------- */
async function loadPython(){
  pyodide = await loadPyodide();
  outputDiv.textContent="Python ready. Click Run ▶";
}
loadPython();

/* ---------- Python input ---------- */
async function getInput(promptText){return new Promise(resolve=>{
  const val=window.prompt(promptText||"Input:");
  resolve(val);
});}

/* ---------- Run Python ---------- */
async function runPython(){
  if(!pyodide){outputDiv.textContent="Python still loading..."; return;}
  saveTab();
  outputDiv.textContent="Running...";
  let firstOutput=true;
  
  pyodide.setStdout({
    batched:(msg)=>{if(firstOutput){outputDiv.textContent=""; firstOutput=false;} outputDiv.textContent+=msg+"\n";}
  });
  pyodide.setStderr({
    batched:(msg)=>{if(firstOutput){outputDiv.textContent=""; firstOutput=false;} outputDiv.textContent+="ERROR: "+msg+"\n";}
  });
  
  pyodide.globals.set("input", getInput);

  try{
    await pyodide.runPythonAsync(activeTab.code);
    if(firstOutput){outputDiv.textContent="✓ Finished (no output)";}
  }catch(err){outputDiv.textContent="❌ "+err;}
}

/* ---------- Pip Install ---------- */
async function installPackage(){
  const pkg = pipInput.value.trim();
  if(!pkg){alert("Enter a package name"); return;}
  outputDiv.textContent=`Installing ${pkg}...`;
  try{
    await pyodide.loadPackage(pkg);
    outputDiv.textContent=`✅ ${pkg} installed successfully.`;
  }catch(err){outputDiv.textContent=`❌ Failed to install ${pkg}: ${err}`;}
}

/* ---------- Find & Replace ---------- */
function findReplace(){
  const findText = findInput.value;
  const replaceText = replaceInput.value;
  if(!findText) return;
  const cursor = editor.getSearchCursor(findText);
  editor.operation(()=>{
    while(cursor.findNext()){cursor.replace(replaceText);}
  });
}

/* ---------- Initialize ---------- */
addTab();
</script>
</body>
</html>
